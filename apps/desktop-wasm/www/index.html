<!DOCTYPE html>
<html lang="ja" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="open-runo GraphQL Federation platform admin UI" />
    <meta name="theme-color" content="#14161a" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <title>open-runo Desktop</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #14161a;
        --bg-raised: #1a1d23;
        --bg-input: #1f2229;
        --fg: #e6e6e6;
        --muted: #9aa0a6;
        --accent: #4f8cff;
        --accent-dim: #3a6bcc;
        --border: #2a2d33;
        --danger: #e5534b;
        --ok: #3fb950;
        --radius: 0.375rem;
      }
      * { box-sizing: border-box; }
      html { scrollbar-color: var(--border) var(--bg); }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 15px;
        line-height: 1.5;
        background: var(--bg);
        color: var(--fg);
        display: flex;
        min-height: 100vh;
      }
      #sidebar {
        width: 240px;
        min-height: 100vh;
        background: var(--bg-raised);
        border-right: 1px solid var(--border);
        padding: 1.25rem 1rem;
        flex-shrink: 0;
      }
      #sidebar h1 {
        font-size: 1.05rem;
        margin: 0 0 0.15rem;
        color: var(--accent);
        letter-spacing: -0.01em;
      }
      #sidebar-nav {
        list-style: none;
        margin: 1.25rem 0 0;
        padding: 0;
      }
      #sidebar-nav li { margin-bottom: 0.2rem; }
      #sidebar-nav a {
        display: block;
        padding: 0.5rem 0.7rem;
        border-radius: var(--radius);
        color: var(--muted);
        text-decoration: none;
        cursor: pointer;
        font-size: 0.9rem;
        transition: background-color 0.1s ease, color 0.1s ease;
      }
      #sidebar-nav a:hover {
        background: var(--bg-input);
        color: var(--fg);
      }
      #sidebar-nav a[data-active="true"] {
        color: var(--fg);
        background: var(--bg-input);
        font-weight: 600;
        box-shadow: inset 2px 0 0 var(--accent);
      }
      #content {
        flex: 1;
        min-width: 0;
        padding: 2rem 2.5rem;
        max-width: 860px;
      }
      #content h2 {
        margin: 0 0 1.25rem;
        font-size: 1.35rem;
        letter-spacing: -0.01em;
      }
      #content p { color: var(--muted); }
      fieldset {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin-bottom: 1.25rem;
        padding: 1rem 1.1rem 1.1rem;
        background: var(--bg-raised);
      }
      legend {
        padding: 0 0.4rem;
        font-weight: 600;
        font-size: 0.85rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      label { display: block; font-size: 0.85rem; color: var(--muted); margin-top: 0.6rem; }
      label:first-child { margin-top: 0; }
      input, select, textarea {
        display: block;
        width: 100%;
        background: var(--bg-input);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.45rem 0.6rem;
        margin: 0.25rem 0 0;
        font: inherit;
      }
      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: var(--accent);
      }
      textarea { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.85rem; resize: vertical; }
      button {
        cursor: pointer;
        background: var(--bg-input);
        color: var(--accent);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.45rem 0.9rem;
        margin: 0.6rem 0.4rem 0 0;
        font: inherit;
        font-weight: 500;
        transition: background-color 0.1s ease, opacity 0.1s ease;
      }
      button:hover:not(:disabled) { background: var(--accent-dim); color: #fff; border-color: var(--accent-dim); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button:first-of-type { margin-left: 0; }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.7rem 0.85rem;
        margin: 0.75rem 0 0;
        font-size: 0.85rem;
        max-height: 320px;
        overflow-y: auto;
      }
      pre:empty { display: none; }
      #sidebar-nav a[href] { color: var(--muted); }
      @media (max-width: 720px) {
        body { flex-direction: column; }
        #sidebar { width: 100%; min-height: auto; border-right: none; border-bottom: 1px solid var(--border); }
        #content { padding: 1.25rem; max-width: none; }
      }
    </style>
  </head>
  <body>
    <nav id="sidebar">
      <h1>open-runo</h1>
      <p style="color: var(--muted); font-size: 0.8rem; margin: 0;">Rust + WebAssembly</p>
      <ul id="sidebar-nav">
        <li><a id="nav-dashboard" data-active="true">Dashboard</a></li>
        <li><a id="nav-schemas">Schema Registry</a></li>
        <li><a id="nav-federation">Federation</a></li>
        <li><a id="nav-ai-routing">AI Routing</a></li>
        <li><a id="nav-db">DUAL DATABASE</a></li>
        <li><a id="nav-scim">SCIM</a></li>
        <li><a id="nav-persisted-queries">Persisted Queries</a></li>
        <li><a id="nav-cache-backup">Cache &amp; Backup</a></li>
        <li><a href="/graphql" target="_blank" rel="noopener" title="Opens GraphiQL in a new tab (only available on the open-runo-gateway binary)">GraphiQL ↗</a></li>
        <li><a href="/api/openapi.json" target="_blank" rel="noopener" title="REST API OpenAPI 3.0 spec (import into Postman/Insomnia/Swagger UI)">OpenAPI spec ↗</a></li>
      </ul>
    </nav>
    <main id="app-root">
      <div id="content">Loading…</div>
    </main>
    <script type="module">
      import init from "./pkg/open_runo_desktop_wasm.js";
      init();
    </script>
  </body>
</html>
