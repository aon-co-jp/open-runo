<!DOCTYPE html>
<html lang="ja" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>open-runo Desktop</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #14161a;
        --fg: #e6e6e6;
        --muted: #9aa0a6;
        --accent: #4f8cff;
        --border: #2a2d33;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: flex;
        min-height: 100vh;
      }
      #sidebar {
        width: 220px;
        min-height: 100vh;
        border-right: 1px solid var(--border);
        padding: 1rem;
        flex-shrink: 0;
      }
      #sidebar h1 {
        font-size: 1rem;
        margin: 0 0 0.5rem;
        color: var(--accent);
      }
      #sidebar-nav {
        list-style: none;
        margin: 1rem 0 0;
        padding: 0;
      }
      #sidebar-nav li { margin-bottom: 0.25rem; }
      #sidebar-nav a {
        display: block;
        padding: 0.4rem 0.6rem;
        border-radius: 0.3rem;
        color: var(--muted);
        text-decoration: none;
        cursor: pointer;
      }
      #sidebar-nav a[data-active="true"] {
        color: var(--fg);
        background: #1f2229;
      }
      #content {
        flex: 1;
        padding: 1.5rem;
      }
      fieldset { border: 1px solid var(--border); border-radius: 0.3rem; margin-bottom: 1rem; }
      input, select, textarea, button {
        background: #1f2229;
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 0.25rem;
        padding: 0.3rem 0.5rem;
        margin: 0.2rem 0;
      }
      button { cursor: pointer; color: var(--accent); }
      pre { white-space: pre-wrap; word-break: break-word; }
    </style>
  </head>
  <body>
    <nav id="sidebar">
      <h1>open-runo</h1>
      <p style="color: var(--muted); font-size: 0.8rem;">Rust + WebAssembly</p>
      <ul id="sidebar-nav">
        <li><a id="nav-dashboard" data-active="true">Dashboard</a></li>
        <li><a id="nav-schemas">Schema Registry</a></li>
        <li><a id="nav-federation">Federation</a></li>
        <li><a id="nav-ai-routing">AI Routing</a></li>
        <li><a id="nav-db">DUAL DATABASE</a></li>
        <li><a id="nav-scim">SCIM</a></li>
      </ul>
    </nav>
    <main id="app-root">
      <div id="content">Loading…</div>
    </main>
    <script type="module">
      import init from "./pkg/open_runo_desktop_wasm.js";
      init();
    </script>
  </body>
</html>
